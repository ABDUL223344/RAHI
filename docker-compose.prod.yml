version: '3.8'

services:
  db_sql:
    image: postgres:15-alpine
    container_name: rahi_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rahi_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_nosql:
    image: mongo:6.0
    container_name: rahi_prod_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    volumes:
      - mongo_prod_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: rahi_prod_redis
    restart: always

  backend:
    build:
      context: ./backend
    container_name: rahi_prod_backend
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-rahi_prod}
      - POSTGRES_HOST=db_sql
      - POSTGRES_PORT=5432
      - MONGO_USER=${MONGO_USER:-admin}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-admin}
      - MONGO_DB=${MONGO_DB:-rahi_prod_logs}
      - MONGO_HOST=db_nosql
      - MONGO_PORT=27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMS_PROVIDER=${SMS_PROVIDER:-mock}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_TOKEN=${TWILIO_TOKEN}
      - TWILIO_FROM=${TWILIO_FROM}
    depends_on:
      db_sql:
        condition: service_healthy
      db_nosql:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  ai_engine:
    build:
      context: ./ai-engine
    container_name: rahi_prod_ai_engine
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./ai-engine/models:/app/models # Persist trained models

  nginx:
    image: nginx:alpine
    container_name: rahi_prod_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - backend

  web:
    build: 
      context: ./apps/web
    container_name: rahi_prod_web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  mongo_prod_data:
