events {}

http {
  server {
    listen 80;

    # Frontend (Next.js)
    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API (FastAPI)
    location /api/v1/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # AI Service (Optional: if we want to expose it publicly, usually we don't)
    # location /ai/ {
    #   proxy_pass http://ai_engine:8001;
    # }
  }
}
